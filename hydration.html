<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriTrack | Hydration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <aside class="sidebar card">
        <div><p class="kicker">NutriTrack</p><h2>Calorie Tracker</h2></div>
        <nav class="sidebar-nav">
          <a class="nav-link" href="./home.html">Dashboard</a>
          <a class="nav-link" href="./meals.html">Meals</a>
          <a class="nav-link active" href="./hydration.html">Hydration</a>
          <a class="nav-link" href="./progress.html">Progress</a>
          <a class="nav-link" href="./settings.html">Settings</a>
        </nav>
        <button id="logout-btn" class="logout-btn" type="button">Log Out</button>
      </aside>

      <section class="content">
        <header class="topbar card">
          <div><h1>Hydration</h1><p class="subtext" id="welcome-text">Loading your account...</p></div>
          <p class="date-pill" id="today-date">Loading date...</p>
        </header>
        <p id="status-message" class="status-message"></p>
        <section class="grid">
          <article class="card">
            <h3>Log water intake</h3>
            <form id="water-form" class="stack-form">
              <label for="water-date">Date</label>
              <input id="water-date" type="date" required />
              <label for="water-amount">Amount (litres)</label>
              <input id="water-amount" type="number" min="0.05" max="8" step="0.05" placeholder="e.g. 0.50" required />
              <button type="submit">Save water intake</button>
            </form>
          </article>
          <article class="card meals-card">
            <h3>Hydration for selected date</h3>
            <p class="value" id="water-total">0.0 L</p>
            <p class="muted" id="water-goal-text">Goal: 2.0 L</p>
            <div class="water-bottle">
              <div id="water-fill" class="water-fill"></div>
            </div>
            <p class="muted" id="water-progress-text">0% of daily goal</p>
            <ul id="water-list" class="simple-list"></ul>
          </article>
        </section>
      </section>
    </main>
    <script type="module" src="hydration.js"></script>
  </body>
</html>
