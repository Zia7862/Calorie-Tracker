<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriTrack | Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <aside class="sidebar card">
        <div><p class="kicker">NutriTrack</p><h2>Calorie Tracker</h2></div>
        <nav class="sidebar-nav">
          <a class="nav-link" href="./home.html">Dashboard</a>
          <a class="nav-link" href="./meals.html">Meals</a>
          <a class="nav-link" href="./hydration.html">Hydration</a>
          <a class="nav-link" href="./progress.html">Progress</a>
          <a class="nav-link active" href="./settings.html">Settings</a>
        </nav>
        <button id="logout-btn" class="logout-btn" type="button">Log Out</button>
      </aside>
      <section class="content">
        <header class="topbar card">
          <div><h1>Settings</h1><p id="welcome-text" class="subtext">Loading your account...</p></div>
          <p id="today-date" class="date-pill">Loading date...</p>
        </header>
        <p id="status-message" class="status-message"></p>
        <section class="grid">
          <article class="card meals-card">
            <h3>Preferences</h3>
            <form id="settings-form" class="stack-form" novalidate>
              <label for="first-name">First name</label>
              <input id="first-name" type="text" required />
              <label for="last-name">Surname</label>
              <input id="last-name" type="text" required />
              <label for="age">Age</label>
              <input id="age" type="number" min="13" max="100" step="1" required />
              <label for="biological-sex">Biological sex (for body fat estimate)</label>
              <select id="biological-sex" name="biologicalSex">
                <option value="">Prefer not to say (uses average)</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
              </select>
              <label for="height-cm">Height (cm)</label>
              <input id="height-cm" type="number" step="0.1" required />
              <label for="goal-weight">Goal weight (kg)</label>
              <input id="goal-weight" type="number" step="0.1" required />
              <label for="goal-timeline-date">Goal timeline</label>
              <input id="goal-timeline-date" type="date" required />
              <label for="default-goal">Default daily calorie goal</label>
              <input id="default-goal" type="number" min="1" step="1" required />
              <label for="hydration-goal">Hydration goal (litres per day)</label>
              <input id="hydration-goal" type="text" inputmode="decimal" placeholder="e.g. 2.5" required />
              <button type="submit">Save preferences</button>
            </form>
          </article>
        </section>
      </section>
    </main>
    <nav class="mobile-bottom-nav">
      <a class="nav-link" href="./home.html">Home</a>
      <a class="nav-link" href="./meals.html">Meals</a>
      <a class="nav-link" href="./hydration.html">Water</a>
      <a class="nav-link" href="./progress.html">Progress</a>
      <a class="nav-link active" href="./settings.html">Settings</a>
    </nav>
    <script type="module" src="settings.js"></script>
  </body>
</html>
