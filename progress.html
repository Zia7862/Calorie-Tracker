<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriTrack | Progress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <aside class="sidebar card">
        <div><p class="kicker">NutriTrack</p><h2>Calorie Tracker</h2></div>
        <nav class="sidebar-nav">
          <a class="nav-link" href="./home.html">Dashboard</a>
          <a class="nav-link" href="./meals.html">Meals</a>
          <a class="nav-link" href="./hydration.html">Hydration</a>
          <a class="nav-link active" href="./progress.html">Progress</a>
          <a class="nav-link" href="./settings.html">Settings</a>
        </nav>
        <button id="logout-btn" class="logout-btn" type="button">Log Out</button>
      </aside>
      <section class="content">
        <header class="topbar card">
          <div><h1>Progress</h1><p id="welcome-text" class="subtext">Loading your account...</p></div>
          <p id="today-date" class="date-pill">Loading date...</p>
        </header>
        <p id="status-message" class="status-message"></p>
        <section class="grid">
          <article class="card">
            <h3>Set daily calorie goal</h3>
            <form id="goal-form" class="stack-form">
              <label for="goal-date">Date</label>
              <input id="goal-date" type="date" required />
              <label for="goal-calories">Calories</label>
              <input id="goal-calories" type="number" min="1" step="1" required />
              <button type="submit">Save goal</button>
            </form>
          </article>
          <article class="card">
            <h3>Log weight</h3>
            <form id="weight-form" class="stack-form">
              <label for="weight-date">Date</label>
              <input id="weight-date" type="date" required />
              <label for="weight-value">Weight (kg)</label>
              <input id="weight-value" type="number" min="1" step="0.1" required />
              <button type="submit">Save weight</button>
            </form>
          </article>
          <article class="card meals-card">
            <h3>Weight history</h3>
            <ul id="weight-list" class="simple-list"></ul>
          </article>
        </section>
      </section>
    </main>
    <script type="module" src="progress.js"></script>
  </body>
</html>
